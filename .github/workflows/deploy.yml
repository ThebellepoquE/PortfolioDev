name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'src/**'
      - 'public/**'
      - 'content/**'
      - 'scripts/generate-sitemap.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'index.html'
      - 'vercel.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Link Vercel project
        run: vercel link --project=portfolio-dev --scope=thebellepoques-projects --yes --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
