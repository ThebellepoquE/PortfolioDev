name: CI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test -- --run

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          npm run lint 2>&1 | tee eslint-output.txt
          echo "${PIPESTATUS[0]}" > eslint-exit-code.txt

      - name: Run Stylelint
        id: stylelint
        if: always()
        continue-on-error: true
        run: |
          npm run lint:styles 2>&1 | tee stylelint-output.txt
          echo "${PIPESTATUS[0]}" > stylelint-exit-code.txt

      - name: Fail if lint issues
        if: always()
        run: |
          eslint_exit=$(cat eslint-exit-code.txt 2>/dev/null || echo 0)
          stylelint_exit=$(cat stylelint-exit-code.txt 2>/dev/null || echo 0)

          if [ -f eslint-output.txt ] && [ -s eslint-output.txt ]; then
            echo "::group::ESLint issues"
            cat eslint-output.txt
            echo "::endgroup::"
          fi

          if [ -f stylelint-output.txt ] && [ -s stylelint-output.txt ]; then
            echo "::group::Stylelint issues"
            cat stylelint-output.txt
            echo "::endgroup::"
          fi

          if [ "$eslint_exit" != "0" ] || [ "$stylelint_exit" != "0" ]; then
            echo ""
            echo "❌ Code quality issues found. Fix them before merging."
            exit 1
          fi
          echo "✅ Code quality OK"

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '## 🤖 Code Review\n\n';

            const eslintFile = path.join(process.env.GITHUB_WORKSPACE, 'eslint-output.txt');
            if (fs.existsSync(eslintFile)) {
              const content = fs.readFileSync(eslintFile, 'utf8').trim();
              body += content
                ? '### 🔵 ESLint\n```\n' + content.slice(0, 1500) + '\n```\n\n'
                : '### ✅ ESLint\nSin errores.\n\n';
            } else {
              body += '### ✅ ESLint\nSin errores.\n\n';
            }

            const stylelintFile = path.join(process.env.GITHUB_WORKSPACE, 'stylelint-output.txt');
            if (fs.existsSync(stylelintFile)) {
              const content = fs.readFileSync(stylelintFile, 'utf8').trim();
              body += content
                ? '### 🟡 Stylelint\n```\n' + content.slice(0, 1500) + '\n```\n\n'
                : '### ✅ Stylelint\nSin errores.\n\n';
            } else {
              body += '### ✅ Stylelint\nSin errores.\n\n';
            }

            body += '---\n*CI · ESLint + Stylelint*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
