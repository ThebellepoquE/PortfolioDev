name: CI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: pnpm run lint > eslint-output.txt 2>&1

      - name: Run Stylelint
        id: stylelint
        if: always()
        continue-on-error: true
        run: pnpm run lint:styles > stylelint-output.txt 2>&1

      - name: Fail if lint issues
        if: always()
        run: |
          issues=0
          if [ -f eslint-output.txt ] && [ -s eslint-output.txt ]; then
            echo "ESLint found issues:"
            cat eslint-output.txt
            issues=1
          fi
          if [ -f stylelint-output.txt ] && grep -q '✖' stylelint-output.txt 2>/dev/null; then
            echo "Stylelint found issues:"
            cat stylelint-output.txt
            issues=1
          fi
          if [ "$issues" -eq 1 ]; then
            echo ""
            echo "❌ Code quality issues found. Fix them before merging."
            exit 1
          fi
          echo "✅ Code quality OK"

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '## 🤖 Code Review\n\n';

            const eslintFile = path.join(process.env.GITHUB_WORKSPACE, 'eslint-output.txt');
            if (fs.existsSync(eslintFile)) {
              const content = fs.readFileSync(eslintFile, 'utf8').trim();
              body += content
                ? '### 🔵 ESLint\n```\n' + content.slice(0, 1500) + '\n```\n\n'
                : '### ✅ ESLint\nSin errores.\n\n';
            } else {
              body += '### ✅ ESLint\nSin errores.\n\n';
            }

            const stylelintFile = path.join(process.env.GITHUB_WORKSPACE, 'stylelint-output.txt');
            if (fs.existsSync(stylelintFile)) {
              const content = fs.readFileSync(stylelintFile, 'utf8').trim();
              body += content
                ? '### 🟡 Stylelint\n```\n' + content.slice(0, 1500) + '\n```\n\n'
                : '### ✅ Stylelint\nSin errores.\n\n';
            } else {
              body += '### ✅ Stylelint\nSin errores.\n\n';
            }

            body += '---\n*CI · ESLint + Stylelint*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
