name: 🤖 Code Review Automático

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    name: Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run lint:styles
      - run: pnpm test -- --run
      - run: pnpm run build

  review:
    name: Code Review
    if: always()
    needs: []
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          pnpm run lint 2>&1 | tee eslint-output.txt || true
          echo "issues=$(grep -c 'error\|warning' eslint-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Run Stylelint
        id: stylelint
        continue-on-error: true
        run: |
          pnpm run lint:styles 2>&1 | tee stylelint-output.txt || true
          echo "issues=$(grep -c '✖\|error\|warning' stylelint-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '## 🤖 Code Review\n\n';

            // ESLint
            const eslintFile = path.join(process.env.GITHUB_WORKSPACE, 'eslint-output.txt');
            if (fs.existsSync(eslintFile)) {
              const content = fs.readFileSync(eslintFile, 'utf8').trim();
              if (content) {
                body += '### 🔵 ESLint\n```\n' + content.slice(0, 2000) + '\n```\n\n';
              } else {
                body += '### ✅ ESLint\nSin errores.\n\n';
              }
            } else {
              body += '### ✅ ESLint\nSin errores.\n\n';
            }

            // Stylelint
            const stylelintFile = path.join(process.env.GITHUB_WORKSPACE, 'stylelint-output.txt');
            if (fs.existsSync(stylelintFile)) {
              const content = fs.readFileSync(stylelintFile, 'utf8').trim();
              if (content) {
                body += '### 🟡 Stylelint\n```\n' + content.slice(0, 2000) + '\n```\n\n';
              } else {
                body += '### ✅ Stylelint\nSin errores.\n\n';
              }
            } else {
              body += '### ✅ Stylelint\nSin errores.\n\n';
            }

            body += '---\n*Revisión automática con ESLint + Stylelint*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
